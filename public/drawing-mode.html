<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameBoard - Whiteboard</title>
    <link rel="stylesheet" href="https://jenil.github.io/bulmaswatch/cyborg/bulmaswatch.min.css">
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/cards.css">
    <link rel="stylesheet" href="assets/css/editor.css">
    <link rel="stylesheet" href="assets/css/drawing-mode.css" id="page-css">
    <link rel="stylesheet" href="assets/css/audio.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Merriweather:wght@300;400;700&family=Kalam:wght@300;400;700&family=Patrick+Hand&family=Cinzel:wght@400;700&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Oswald:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script defer src="https://use.fontawesome.com/releases/v5.15.4/js/all.js"></script>

    <!-- Fabric.js Lazy Loader (Superset in Shell) -->
    <script>
        window.__loadFabric = () => new Promise((resolve) => {
            if (window.fabric) { resolve(); return; }
            const s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/fabric@7.2.0/dist/index.min.js';
            s.onload = () => { window.fabric = fabric; resolve(); };
            document.head.appendChild(s);
        });
    </script>

    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js",
        "firebase/storage": "https://www.gstatic.com/firebasejs/9.15.0/firebase-storage.js",
        "@3d-dice/dice-box": "./node_modules/@3d-dice/dice-box/dist/dice-box.es.js"
      }
    }
    </script>
</head>
<body>
    <div id="app-header"></div>
    <div id="app-overlays"></div>
    <div id="app-fab"></div>

    <div id="page-content">
        <div class="whiteboard-layout">
            <div class="wb-vertical-bar">
                <div class="wb-tool-group">
                    <button class="button is-small tool-btn is-active" data-tool="select" title="Selecionar (V)"><i class="fas fa-mouse-pointer"></i></button>
                    <button class="button is-small tool-btn" data-tool="move" title="Mover (Espaço)"><i class="fas fa-hand-paper"></i></button>
                    <button class="button is-small tool-btn" data-tool="draw" title="Pincel (P)"><i class="fas fa-pencil-alt"></i></button>
                    <button class="button is-small tool-btn" data-tool="text" title="Texto (T)"><i class="fas fa-font"></i></button>
                    <button class="button is-small tool-btn" data-tool="shape" title="Formas (S)"><i class="fas fa-shapes"></i></button>
                    <button class="button is-small tool-btn" id="btn-assets-toggle" title="Assets"><i class="fas fa-images"></i></button>
                    <button class="button is-small tool-btn" id="btn-image-upload" title="Upload Imagem"><i class="fas fa-upload"></i></button>
                    <input type="file" id="file-upload-input" accept="image/*" style="display: none;">
                </div>
                <div class="wb-tool-group bottom">
                    <button class="button is-small is-danger is-light" id="btn-clear"><i class="fas fa-trash"></i></button>
                    <button class="button is-small is-success" id="btn-export"><i class="fas fa-file-download"></i></button>
                </div>
            </div>

            <!-- Panels and Options moved here if needed or kept as is -->
            <div class="wb-options-panel" id="options-panel-draw" style="display: none;">
                <!-- ... content ... -->
                <div class="panel-row">
                    <label>Cor</label>
                    <input type="color" id="wb-color-draw" value="#000000">
                </div>
                <div class="panel-row">
                    <label>Tamanho</label>
                    <input type="range" id="wb-width-draw" min="1" max="50" value="3">
                </div>
            </div>

            <!-- Main Area -->
            <div class="wb-container">
                <div class="wb-assets-drawer" id="assets-drawer">
                    <!-- ... tabs ... -->
                    <div id="assets-cards-list" class="assets-list"></div>
                </div>
                <div class="wb-scroll-area" id="wb-scroll-area">
                    <canvas id="c"></canvas>
                </div>
            </div>
        </div>

        <div class="wb-board-manager">
            <select id="board-select"><option>Carregando...</option></select>
            <button id="btn-add-board" class="button is-success is-small"><i class="fas fa-plus"></i></button>
        </div>

        <div id="wb-context-menu" class="wb-context-menu" style="display: none;">
            <button class="ctx-item" data-action="delete">Deletar</button>
        </div>

        <div class="wb-actions-panel">
            <button id="btn-zoom-out"><i class="fas fa-minus"></i></button>
            <span id="btn-zoom-reset">100%</span>
            <button id="btn-zoom-in"><i class="fas fa-plus"></i></button>
        </div>
    </div>

    <script type="module" src="./assets/js/firebase-config.js"></script>
    <script type="module" src="./assets/js/shell.js"></script>
</body>
</html>
