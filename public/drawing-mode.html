<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteboard - GameBoard</title>
    <link rel="stylesheet" href="https://jenil.github.io/bulmaswatch/cyborg/bulmaswatch.min.css">
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/cards.css">
    <link rel="stylesheet" href="assets/css/editor.css">
    <link rel="stylesheet" href="assets/css/drawing-mode.css">
    <script defer src="https://use.fontawesome.com/releases/v5.15.4/js/all.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Patrick+Hand&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Fabric.js Global -->
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/9.15.0/firebase-storage.js"
            }
        }
    </script>
</head>
<body>
    <div id="app-header"></div>
    <div id="app-overlays"></div>
    <div id="app-fab"></div>

    <div class="whiteboard-layout">
        <!-- Sidebar Esquerda (Vertical) -->
        <div class="wb-vertical-bar">
            <!-- Ferramentas Principais -->
            <div class="wb-tool-group">
                <button class="button is-small tool-btn is-active" data-tool="select" title="Selecionar (V)">
                    <i class="fas fa-mouse-pointer"></i>
                </button>
                <button class="button is-small tool-btn" data-tool="move" title="Mover (Espaço)">
                    <i class="fas fa-hand-paper"></i>
                </button>
                <button class="button is-small tool-btn" data-tool="draw" title="Pincel (P)">
                    <i class="fas fa-pencil-alt"></i>
                </button>
                <button class="button is-small tool-btn" data-tool="text" title="Texto (T)">
                    <i class="fas fa-font"></i>
                </button>
                
                <button class="button is-small tool-btn" data-tool="shape" title="Formas (S)">
                    <i class="fas fa-shapes"></i>
                </button>

                <button class="button is-small tool-btn" id="btn-assets-toggle" title="Assets">
                    <i class="fas fa-images"></i>
                </button>
                
                <button class="button is-small tool-btn" id="btn-image-upload" title="Upload Imagem">
                    <i class="fas fa-upload"></i>
                </button>
                <input type="file" id="file-upload-input" accept="image/*" style="display: none;">
            </div>

            <div class="wb-tool-group bottom">
                <button class="button is-small is-danger is-light" id="btn-clear" title="Limpar Tudo">
                    <i class="fas fa-trash"></i>
                </button>
                <button class="button is-small is-success" id="btn-export" title="Baixar JPG">
                    <i class="fas fa-file-download"></i>
                </button>
            </div>
        </div>

        <!-- Painéis de Opções (Flutuantes/Contextuais) -->
        <div class="wb-options-panel" id="options-panel-draw" style="display: none;">
            <h6 class="panel-title">Pincel</h6>
            
            <div class="panel-row">
                <label>Cor</label>
                <input type="color" class="color-picker" id="wb-color-draw" value="#000000">
            </div>
            
            <div class="panel-row">
                <label>Tamanho</label>
                <input type="range" id="wb-width-draw" min="1" max="50" value="3" class="slider">
            </div>

            <div class="panel-row">
                <label>Opacidade</label>
                <input type="range" id="wb-opacity-draw" min="0.1" max="1" step="0.1" value="1" class="slider">
            </div>

            <div class="panel-row">
                <label>Estilo</label>
                <div class="buttons has-addons is-centered is-small">
                    <button class="button is-selected is-info style-btn" data-style="solid">Sólido</button>
                    <button class="button style-btn" data-style="dashed">Tracejado</button>
                </div>
            </div>
        </div>

        <div class="wb-options-panel" id="options-panel-text" style="display: none;">
            <h6 class="panel-title">Texto</h6>
            <div class="panel-row">
                <label>Cor</label>
                <input type="color" class="color-picker" id="wb-color-text" value="#000000">
            </div>
            <div class="panel-row">
                <div class="select is-small is-fullwidth">
                    <select id="wb-font-family">
                        <option value="Arial" selected>Arial</option>
                        <option value="Patrick Hand">Hand</option>
                        <option value="Kalam">Marker</option>
                        <option value="Roboto">Roboto</option>
                    </select>
                </div>
            </div>
            <div class="panel-row">
                <button class="button is-small is-fullwidth" id="btn-text-bg" data-active="false">
                    <span class="icon"><i class="fas fa-highlighter"></i></span>
                    <span>Fundo</span>
                </button>
            </div>
        </div>

        <div class="wb-options-panel" id="options-panel-shape" style="display: none;">
            <h6 class="panel-title">Formas</h6>
            <div class="panel-row">
                <label>Cor da Borda</label>
                <input type="color" class="color-picker" id="wb-color-shape" value="#000000">
            </div>
            <div class="panel-row">
                <label>Espessura</label>
                <input type="range" id="wb-width-shape" min="1" max="20" value="3" class="slider">
            </div>
            <div class="panel-row">
                <label>Estilo</label>
                <div class="buttons has-addons is-centered is-small">
                    <button class="button shape-fill-btn is-info is-selected" data-fill="border" title="Borda"><i class="far fa-square"></i></button>
                    <button class="button shape-fill-btn" data-fill="solid" title="Sólido"><i class="fas fa-square"></i></button>
                </div>
            </div>
            <div class="panel-row">
                <label>Tipo</label>
                <div class="buttons has-addons is-centered is-small">
                    <button class="button shape-option" data-shape="rect" title="Quadrado"><i class="fas fa-square"></i></button>
                    <button class="button shape-option" data-shape="circle" title="Círculo"><i class="fas fa-circle"></i></button>
                    <button class="button shape-option" data-shape="triangle" title="Triângulo"><i class="fas fa-play" style="transform: rotate(-90deg);"></i></button>
                    <button class="button shape-option" data-shape="arrow" title="Seta"><i class="fas fa-long-arrow-alt-right"></i></button>
                </div>
            </div>
        </div>
        
        <!-- Área Principal -->
        <div class="wb-container">
            <!-- Assets Drawer (Oculto por padrão) -->
            <div class="wb-assets-drawer" id="assets-drawer">
                <div class="tabs is-small is-centered is-fullwidth mt-2 mb-2">
                    <ul>
                        <li class="is-active" data-tab="cards"><a>Cards</a></li>
                        <li data-tab="resources"><a>Recursos</a></li>
                        <li data-tab="integrations"><a>Integrações</a></li>
                    </ul>
                </div>
                
                <div class="tab-content">
                    <!-- Cards Tab -->
                    <div id="tab-cards" class="content-tab is-active">
                        <div class="field px-2">
                            <div class="control has-icons-left">
                                <input class="input is-small" type="text" id="assets-card-search" placeholder="Buscar card...">
                                <span class="icon is-small is-left">
                                    <i class="fas fa-search"></i>
                                </span>
                            </div>
                        </div>
                        <div id="assets-cards-list" class="assets-list px-2" style="display: flex; flex-wrap: wrap; gap: 5px; overflow-y: auto; max-height: 400px; justify-content: center;">
                            <div class="has-text-centered p-2 has-text-grey">
                                <small>Carregando cards...</small>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Resources Tab -->
                    <div id="tab-resources" class="content-tab" style="display: none;">
                        <div class="has-text-centered px-2 mb-2">
                             <button class="button is-small is-info is-fullwidth" id="btn-assets-resource-upload">
                                 <i class="fas fa-upload mr-1"></i> Subir Recurso
                             </button>
                             <small class="has-text-grey is-size-7">PNG, SVG</small>
                        </div>
                        <div id="assets-resources-list" class="assets-list px-2" style="display: flex; flex-wrap: wrap; gap: 5px; overflow-y: auto; max-height: 400px; justify-content: center;">
                            <div class="has-text-centered p-2 has-text-grey">
                                <small>Nenhum recurso.</small>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Integrations Tab -->
                    <div id="tab-integrations" class="content-tab" style="display: none;">
                        <div class="px-2">
                            <p class="is-size-7 mb-2">Geradores úteis:</p>
                            <a href="https://azgaar.github.io/Fantasy-Map-Generator/" target="_blank" class="button is-small is-fullwidth is-dark mb-2">Fantasy Map <i class="fas fa-external-link-alt ml-1"></i></a>
                            <a href="https://watabou.itch.io/medieval-fantasy-city-generator" target="_blank" class="button is-small is-fullwidth is-dark mb-2">Medieval City <i class="fas fa-external-link-alt ml-1"></i></a>
                            <a href="https://donjon.bin.sh/" target="_blank" class="button is-small is-fullwidth is-dark mb-2">Donjon Tools <i class="fas fa-external-link-alt ml-1"></i></a>
                            <p class="is-size-7 has-text-grey mt-4">Integrações diretas em breve.</p>
                        </div>
                    </div>
                    
                    <!-- Default fallback for compatibility -->
                    <div id="assets-list" style="display:none;"></div>
                </div>
            </div>

            <div class="wb-scroll-area" id="wb-scroll-area">
                <canvas id="c"></canvas>
            </div>
        </div>
    </div>
    
    <!-- Gerenciador de Boards -->
    <div class="wb-board-manager">
        <div class="select is-small">
            <select id="board-select">
                <option value="" disabled selected>Carregando...</option>
            </select>
        </div>
        <button id="btn-add-board" class="button is-success is-small"><i class="fas fa-plus"></i></button>
        <button id="btn-del-board" class="button is-danger is-small"><i class="fas fa-trash"></i></button>
        <button id="btn-save-board" class="button is-info is-small"><i class="fas fa-save"></i></button>
    </div>

    <!-- Custom Context Menu -->
    <div id="wb-context-menu" class="wb-context-menu" style="display: none;">
        <button class="ctx-item" data-action="front">
            <span class="icon"><i class="fas fa-arrow-up"></i></span>
            <span>Trazer para Frente</span>
        </button>
        <button class="ctx-item" data-action="back">
            <span class="icon"><i class="fas fa-arrow-down"></i></span>
            <span>Enviar para Trás</span>
        </button>
        <div class="ctx-separator"></div>
        <button class="ctx-item" data-action="lock">
            <span class="icon"><i class="fas fa-lock"></i></span>
            <span>Travar/Destravar</span>
        </button>
        <div class="ctx-separator"></div>
        <button class="ctx-item is-danger" data-action="delete">
            <span class="icon"><i class="fas fa-trash"></i></span>
            <span>Deletar</span>
        </button>
    </div>

    <!-- Actions Panel (Bottom Left) -->
    <div class="wb-actions-panel">
        <div class="wb-action-group">
            <button class="wb-action-btn" id="btn-zoom-out"><i class="fas fa-minus"></i></button>
            <button class="wb-action-btn zoom-display" id="btn-zoom-reset">100%</button>
            <button class="wb-action-btn" id="btn-zoom-in"><i class="fas fa-plus"></i></button>
        </div>
        <div class="wb-separator-vertical"></div>
        <div class="wb-action-group">
            <button class="wb-action-btn" id="btn-undo" disabled><i class="fas fa-undo"></i></button>
            <button class="wb-action-btn" id="btn-redo" disabled><i class="fas fa-redo"></i></button>
        </div>
    </div>

    <!-- Modal de Criação/Edição de Card (reutilizado do grid) -->
    <div id="add-card-modal" class="modal">
        <div class="modal-background"></div>
        <div class="modal-card">
            <header class="modal-card-head">
                <p class="modal-card-title">Editar Card</p>
                <button class="delete" aria-label="close"></button>
            </header>
            <section class="modal-card-body">
                <form id="form-add-card" autocomplete="off">
                    <div class="card-modal-layout">
                        <aside class="card-modal-sidebar">
                            <div id="card-modal-image-preview" class="card-modal-image-preview">
                                <img id="card-modal-image-el" src="" alt="Preview" class="is-empty">
                                <div class="card-modal-image-placeholder">
                                    <i class="fas fa-image"></i>
                                    <span>Clique para adicionar imagem</span>
                                </div>
                                <div class="card-modal-image-overlay">
                                    <i class="fas fa-camera" style="font-size:1.5rem"></i>
                                    <span>Trocar imagem</span>
                                </div>
                                <button type="button" id="card-modal-image-remove" class="card-modal-image-remove" title="Remover imagem">
                                    <i class="fas fa-times"></i>
                                </button>
                                <input type="file" id="card-modal-file-input" accept="image/*">
                            </div>
                            <div class="card-modal-meta">
                                <div class="field">
                                    <label class="label" for="card-tags">Tags</label>
                                    <div class="control">
                                        <input class="input is-small" id="card-tags" placeholder="rpg, personagem, item…" autocomplete="off">
                                    </div>
                                </div>
                                <div class="card-modal-visibility narrator-only is-hidden">
                                    <label class="checkbox narrator-control">
                                        <input type="checkbox" id="card-visibility" checked>
                                        <span class="switch-track"></span>
                                        <span class="switch-label-text">Visível para jogadores</span>
                                    </label>
                                </div>
                            </div>
                        </aside>
                        <div class="card-modal-main">
                            <div class="field card-modal-title-field">
                                <label class="label" for="card-titulo">Título</label>
                                <div class="control">
                                    <input class="input" id="card-titulo" placeholder="Nome do card" required autocomplete="off">
                                </div>
                            </div>
                            <div class="field" style="flex:1; display:flex; flex-direction:column; min-height:0;">
                                <label class="label">Conteúdo</label>
                                <div class="card-modal-editor-wrap">
                                    <div id="card-modal-toolbar" class="tiptap-toolbar">
                                        <div class="tiptap-toolbar-group">
                                            <button type="button" class="tiptap-btn" data-tiptap-action="undo" title="Desfazer"><i class="fas fa-undo"></i></button>
                                            <button type="button" class="tiptap-btn" data-tiptap-action="redo" title="Refazer"><i class="fas fa-redo"></i></button>
                                        </div>
                                        <div class="tiptap-toolbar-divider"></div>
                                        <div class="tiptap-toolbar-group">
                                            <button type="button" class="tiptap-btn tiptap-btn-text" data-tiptap-action="heading" data-tiptap-arg="1">H1</button>
                                            <button type="button" class="tiptap-btn tiptap-btn-text" data-tiptap-action="heading" data-tiptap-arg="2">H2</button>
                                            <button type="button" class="tiptap-btn tiptap-btn-text" data-tiptap-action="heading" data-tiptap-arg="3">H3</button>
                                        </div>
                                        <div class="tiptap-toolbar-divider"></div>
                                        <div class="tiptap-toolbar-group">
                                            <button type="button" class="tiptap-btn" data-tiptap-action="bold"><i class="fas fa-bold"></i></button>
                                            <button type="button" class="tiptap-btn" data-tiptap-action="italic"><i class="fas fa-italic"></i></button>
                                            <button type="button" class="tiptap-btn" data-tiptap-action="strike"><i class="fas fa-strikethrough"></i></button>
                                        </div>
                                        <div class="tiptap-toolbar-divider"></div>
                                        <div class="tiptap-toolbar-group">
                                            <button type="button" class="tiptap-btn" data-tiptap-action="bulletList"><i class="fas fa-list-ul"></i></button>
                                            <button type="button" class="tiptap-btn" data-tiptap-action="orderedList"><i class="fas fa-list-ol"></i></button>
                                            <button type="button" class="tiptap-btn" data-tiptap-action="blockquote"><i class="fas fa-quote-right"></i></button>
                                        </div>
                                        <div class="tiptap-toolbar-divider"></div>
                                        <div id="card-modal-shortcode-container"></div>
                                        <div class="tiptap-toolbar-group" style="margin-left:auto">
                                            <button type="button" class="tiptap-btn" data-tiptap-action="clearFormat" title="Limpar formatação"><i class="fas fa-remove-format"></i></button>
                                        </div>
                                    </div>
                                    <div id="card-modal-editor" class="tiptap-editor-area"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </section>
            <footer class="modal-card-foot">
                <button class="button modal-cancel">Cancelar</button>
                <button class="button is-link" form="form-add-card" type="submit">Salvar Alterações</button>
            </footer>
        </div>
    </div>

    <script type="module" src="assets/js/firebase-config.js"></script>
    <script type="module" src="assets/js/drawing-mode.js"></script>
</body>
</html>
