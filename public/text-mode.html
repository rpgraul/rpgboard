<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameBoard - Notes</title>
    <link rel="stylesheet" href="https://jenil.github.io/bulmaswatch/cyborg/bulmaswatch.min.css">
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/cards.css">
    <link rel="stylesheet" href="assets/css/editor.css">
    <link rel="stylesheet" href="assets/css/text-mode.css" id="page-css">
    <link rel="stylesheet" href="assets/css/shortcodes.css">
    <link rel="stylesheet" href="assets/css/audio.css">

    <script defer src="https://use.fontawesome.com/releases/v5.15.4/js/all.js"></script>

    <script type="importmap">
    {
      "imports": {
        "firebase/app":                    "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js",
        "firebase/firestore":              "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js",
        "firebase/storage":                "https://www.gstatic.com/firebasejs/9.15.0/firebase-storage.js",
        "@tiptap/core":                    "https://esm.sh/@tiptap/core@2.2.4",
        "@tiptap/starter-kit":             "https://esm.sh/@tiptap/starter-kit@2.2.4",
        "@tiptap/extension-link":          "https://esm.sh/@tiptap/extension-link@2.2.4",
        "@tiptap/extension-highlight":     "https://esm.sh/@tiptap/extension-highlight@2.2.4",
        "@tiptap/extension-underline":     "https://esm.sh/@tiptap/extension-underline@2.2.4",
        "@tiptap/extension-text-align":    "https://esm.sh/@tiptap/extension-text-align@2.2.4",
        "@tiptap/suggestion":              "https://esm.sh/@tiptap/suggestion@2.2.4",
        "@3d-dice/dice-box":               "./node_modules/@3d-dice/dice-box/dist/dice-box.es.js"
      }
    }
    </script>
</head>
<body>
    <div id="app-header"></div>
    <div id="app-overlays"></div>
    <div id="app-fab"></div>

    <div id="page-content">
        <div id="app-wrapper" class="editor-layout">
            <div class="editor-column is-left">
                <div class="panel">
                    <div class="panel-heading">
                        <span>Cards</span>
                        <button id="add-card-btn" class="button is-text is-small" title="Adicionar Novo Card">
                            <span class="icon"><i class="fas fa-plus"></i></span>
                        </button>
                    </div>
                    <div class="panel-block search-container">
                        <p class="control has-icons-left">
                            <input class="input is-small" type="text" id="search-input" placeholder="Buscar...">
                            <span class="icon is-small is-left"><i class="fas fa-search"></i></span>
                        </p>
                    </div>
                    <div id="card-list-container">
                        <aside class="menu">
                            <ul class="menu-list" id="card-list"></ul>
                        </aside>
                    </div>
                </div>
            </div>
            <div class="editor-column is-center">
                <div id="text-editor-container" style="display: none;">
                    <div class="editor-header">
                        <div class="title-container">
                             <div id="card-avatar" class="card-avatar">
                                <i class="fas fa-image placeholder-icon"></i>
                            </div>
                            <h2 id="card-title" contenteditable="true" class="title is-2"></h2>
                            <button id="delete-card-btn" class="tiptap-button delete-card-icon"><i class="fas fa-trash-alt"></i></button>
                        </div>
                        <div id="card-tags" contenteditable="true" class="editable-field" data-placeholder="Tags..." spellcheck="false"></div>
                    </div>
                    <div id="tiptap-container">
                        <div id="editor"></div>
                    </div>
                </div>
                <div id="empty-state" class="has-text-centered">
                    <p class="is-size-4 has-text-grey-light">Selecione um card ou crie um novo.</p>
                </div>
            </div>
        </div>

        <div id="image-modal" class="modal">
            <div class="modal-background"></div>
            <div class="modal-content">
                <div class="box">
                    <img id="image-modal-img" src="">
                    <input type="file" id="image-upload-input" class="is-hidden" accept="image/*">
                </div>
            </div>
            <button class="modal-close is-large" aria-label="close"></button>
        </div>
    </div>

    <script type="module" src="./assets/js/firebase-config.js"></script>
    <script type="module" src="./assets/js/shell.js"></script>
</body>
</html>
