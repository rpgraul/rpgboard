<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameBoard</title>
    <link rel="stylesheet" href="https://jenil.github.io/bulmaswatch/cyborg/bulmaswatch.min.css">
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/cards.css">
    <link rel="stylesheet" href="assets/css/editor.css">
    <link rel="stylesheet" href="assets/css/shortcodes.css">
    <link rel="stylesheet" href="assets/css/audio.css">

    <link id="page-css" rel="stylesheet" href="">
    <script defer src="https://use.fontawesome.com/releases/v5.15.4/js/all.js"></script>

    <script type="importmap">
    {
      "imports": {
        "firebase/app":                    "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js",
        "firebase/firestore":              "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js",
        "firebase/storage":                "https://www.gstatic.com/firebasejs/9.15.0/firebase-storage.js",
        "@tiptap/core":                    "https://esm.sh/@tiptap/core@2.2.4",
        "@tiptap/starter-kit":             "https://esm.sh/@tiptap/starter-kit@2.2.4",
        "@tiptap/extension-link":          "https://esm.sh/@tiptap/extension-link@2.2.4",
        "@tiptap/extension-highlight":     "https://esm.sh/@tiptap/extension-highlight@2.2.4",
        "@tiptap/extension-underline":     "https://esm.sh/@tiptap/extension-underline@2.2.4",
        "@tiptap/extension-text-align":    "https://esm.sh/@tiptap/extension-text-align@2.2.4",
        "@tiptap/suggestion":              "https://esm.sh/@tiptap/suggestion@2.2.4",
        "@3d-dice/dice-box":               "./node_modules/@3d-dice/dice-box/dist/dice-box.es.js"
      }
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/web-animations-js@2.3.2/web-animations.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/muuri@0.9.5/dist/muuri.min.js"></script>
</head>
<body>
    <div id="app-header"></div>
    <div id="app-overlays"></div>
    <div id="app-fab"></div>

    <div id="page-content">
        <div id="app-wrapper">
            <section id="main-content" class="section">
                <div class="container">
                    <div id="view-wrapper">
                        <div id="grid-view-wrapper">
                            <div class="field is-grouped mb-4">
                                <p class="control has-icons-left is-expanded">
                                    <input class="input is-medium" type="text" id="search-input" placeholder="Buscar por título, conteúdo ou tag...">
                                    <span class="icon is-small is-left"><i class="fas fa-search"></i></span>
                                </p>
                                <p class="control">
                                    <button id="clear-filters-btn" class="button is-light is-hidden" title="Limpar busca e filtros"><span class="icon"><i class="fas fa-times"></i></span></button>
                                </p>
                            </div>
                            
                            <div id="category-filters" class="field is-grouped is-grouped-multiline mb-4">
                                <div class="control">
                                    <button class="button is-small is-rounded is-dark active" data-category="all">Todos</button>
                                </div>
                                <!-- ... categorias ... -->
                                <div class="control">
                                    <button class="button is-small is-rounded is-dark" data-category="pj">Personagem</button>
                                </div>
                                <div class="control">
                                    <button class="button is-small is-rounded is-dark" data-category="monstro">Monstro</button>
                                </div>
                                <div class="control">
                                    <button class="button is-small is-rounded is-dark" data-category="npc">NPC</button>
                                </div>
                                <div class="control">
                                    <button class="button is-small is-rounded is-dark" data-category="item">Item</button>
                                </div>
                                <div class="control">
                                    <button class="button is-small is-rounded is-dark" data-category="anotacao">Anotação</button>
                                </div>
                            </div>

                            <div id="tag-filters" class="field is-grouped is-grouped-multiline mb-4">
                                <div class="control narrator-only is-hidden">
                                    <label class="checkbox"><input type="checkbox" value="visible"> <span>Visível</span></label>
                                </div>
                                <div class="control narrator-only is-hidden">
                                    <label class="checkbox"><input type="checkbox" value="hidden"> <span>Oculto</span></label>
                                </div>
                            </div>

                            <div id="active-filters-container" class="mb-4"></div>

                            <div id="grid-view-container">
                                <div id="loading-indicator" class="column is-full has-text-centered">
                                    <p class="is-size-4 has-text-grey-light">Carregando itens...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Toolbar de Edição em Massa -->
        <div id="bulk-edit-toolbar" class="bulk-edit-bar">
            <div class="container">
                <div class="bulk-edit-actions">
                    <button id="bulk-action-visible" class="button is-success">Tornar Visível</button>
                    <button id="bulk-action-hidden" class="button is-danger">Ocultar</button>
                    <button id="bulk-action-delete" class="button is-danger">Deletar</button>
                </div>
                <div class="bulk-edit-info"><span id="bulk-edit-count">0 cards selecionados</span></div>
                <div class="bulk-edit-cancel"><button id="bulk-action-cancel" class="button">Cancelar</button></div>
            </div>
        </div>
    </div>

    <script type="module" src="./assets/js/firebase-config.js"></script>
    <script type="module" src="./assets/js/shell.js"></script>
</body>
</html>
